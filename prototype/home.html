<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlowStudy - 首页原型</title>
    <style>
      body { margin: 0; font-family: "Segoe UI", Arial, sans-serif; background: #f5f7fb; color: #1f2a37; }
      .top { height: 64px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; background: #fff; border-bottom: 1px solid #e5e7eb; }
      .nav { display: flex; gap: 20px; }
      .btn { border: 1px solid #cbd5e1; border-radius: 8px; padding: 8px 14px; text-decoration: none; color: #1e3a8a; background: #eef2ff; }
      .hero { max-width: 1100px; margin: 36px auto; padding: 0 18px; display: grid; grid-template-columns: 1fr 1fr; gap: 24px; align-items: center; }
      .panel { background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; padding: 18px; }
      h1 { margin: 0 0 10px; font-size: 42px; }
      ul { margin: 0; padding-left: 20px; line-height: 1.8; }
      @media (max-width: 860px) { .hero { grid-template-columns: 1fr; } .nav { display:none; } }
    </style>
  </head>
  <body>
    <header class="top">
      <strong>FlowStudy</strong>
      <nav class="nav">
        <span>后端开发</span><span>计算机基础</span><span>AI应用开发</span><span>推荐阅读</span>
      </nav>
      <div>
        <a class="btn" href="./auth.html">登录</a>
        <a class="btn" href="./auth.html">注册</a>
      </div>
    </header>

    <main class="hero">
      <section class="panel">
        <h1>FlowStudy 首页</h1>
        <p>用于展示学习入口、推荐文章和导航分类。</p>
        <p><a class="btn" href="./article.html">进入文章页</a></p>
      </section>
      <section class="panel">
        <h3>推荐内容</h3>
        <ul>
          <li>Java 面试指南</li>
          <li>系统设计高频题</li>
          <li>分布式与高并发实践</li>
          <li>AI 编程与工程化</li>
        </ul>
      </section>
    </main>
  </body>
  </html>
