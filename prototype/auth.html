<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlowStudy - 登录注册原型</title>
    <style>
      body { margin: 0; font-family: "Segoe UI", Arial, sans-serif; background: linear-gradient(135deg,#eef6ff,#fff4d8); }
      .wrap { min-height: 100vh; display: grid; place-items: center; padding: 16px; }
      .card { width: min(440px, 100%); background: #fff; border: 1px solid #dbeafe; border-radius: 10px; padding: 20px; box-shadow: 0 16px 30px rgba(29,78,216,.12); }
      h2 { margin: 0 0 8px; }
      .tabs { display: flex; gap: 8px; margin-bottom: 14px; }
      .tab { flex: 1; text-align: center; padding: 8px; border-radius: 8px; background: #e0ecff; color: #1d4ed8; }
      label { display: block; margin: 10px 0 6px; font-size: 14px; }
      input { width: 100%; height: 40px; border: 1px solid #cbd5e1; border-radius: 8px; padding: 0 10px; }
      .btn { margin-top: 14px; width: 100%; height: 42px; border: none; border-radius: 8px; background: #2563eb; color: #fff; }
      .links { margin-top: 10px; text-align: center; font-size: 14px; }
      a { color: #1d4ed8; text-decoration: none; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <section class="card">
        <h2>登录 / 注册原型</h2>
        <div class="tabs">
          <div class="tab">登录</div>
          <div class="tab">注册</div>
        </div>
        <label>邮箱</label>
        <input placeholder="name@example.com" />
        <label>密码</label>
        <input type="password" placeholder="请输入密码" />
        <label>确认密码（注册时）</label>
        <input type="password" placeholder="再次输入密码" />
        <button class="btn">提交</button>
        <p class="links"><a href="./home.html">返回首页</a> · <a href="./article.html">去文章页</a></p>
      </section>
    </div>
  </body>
  </html>
