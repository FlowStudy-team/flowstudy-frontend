<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1800" viewBox="0 0 1600 1800">
  <style>
    .bg{fill:#f6f8fb}.board{fill:#fff;stroke:#111827;stroke-width:3}.panel{fill:#fcfcfd;stroke:#d8dee9;stroke-width:2}.line{stroke:#d8dee9;stroke-width:2}.text{font-family:Arial,"Microsoft YaHei",sans-serif;fill:#1f2937;font-size:24px}.small{font-size:18px;fill:#6b7280}.title{font-size:34px;font-weight:700}.label{font-size:22px;font-weight:700}.btn{fill:#eef4ff;stroke:#2563eb;stroke-width:2}.primary{fill:#2563eb}.white{fill:white}.code{fill:#0f172a}.codeText{font-family:Consolas,monospace;fill:#dbeafe;font-size:18px}
  </style>
  <rect class="bg" x="0" y="0" width="1600" height="1800"/>
  <text class="text title" x="60" y="70">FlowStudy 文档模块原型图</text>
